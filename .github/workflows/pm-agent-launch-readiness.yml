name: PM Agent Launch Readiness

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  launch-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run verify
        run: npm run verify

      - name: Run Cloud Run preflight
        run: npm run pm-agent:cloud-run-preflight
